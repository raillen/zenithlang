name: CI

on:
  pull_request:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  build-check-smoke:
    name: Build, check, smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup GCC on Windows
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add Windows GCC to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup GCC on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Setup GCC on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          gcc --version

      - name: Toolchain versions
        shell: bash
        run: |
          python --version
          gcc --version

      - name: Build compiler
        shell: bash
        run: python build.py

      - name: Check root project
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\zt.exe check zenith.ztproj --all --ci

      - name: Check root project
        if: runner.os == 'Linux'
        shell: bash
        run: ./zt.exe check zenith.ztproj --all --ci

      - name: Smoke suite
        shell: bash
        run: python run_suite.py smoke --no-perf
