name: Examples Smoke

on:
  pull_request:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

jobs:
  examples-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup GCC (MSYS2)
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Add GCC to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Toolchain versions
        shell: pwsh
        run: |
          python --version
          gcc --version

      - name: Build compiler
        shell: pwsh
        run: |
          python build.py

      - name: Check all examples
        shell: pwsh
        run: |
          $projects = Get-ChildItem -Path examples -Recurse -Filter zenith.ztproj | Sort-Object FullName
          if (-not $projects) {
            throw "No examples found."
          }

          foreach ($project in $projects) {
            Write-Host "Checking $($project.FullName)"
            .\zt.exe check $project.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Check failed for $($project.FullName)"
            }
          }

      - name: Run key examples
        shell: pwsh
        run: |
          $runProjects = @(
            "examples/hello-world/zenith.ztproj",
            "examples/std-json/zenith.ztproj",
            "examples/extern-c-puts/zenith.ztproj"
          )

          foreach ($project in $runProjects) {
            Write-Host "Running $project"
            .\zt.exe run $project
            if ($LASTEXITCODE -ne 0) {
              throw "Run failed for $project"
            }
          }

