name: Sync Wiki

on:
  push:
    branches: ["master", "main"]
    paths:
      - "docs/wiki/**"
      - ".github/workflows/wiki-sync.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync wiki content
        env:
          WIKI_REPO: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git
        run: |
          set -euo pipefail

          if [ ! -d "docs/wiki" ]; then
            echo "docs/wiki directory not found"
            exit 1
          fi

          git clone "$WIKI_REPO" wiki_repo || {
            echo "Failed to clone wiki repository."
            echo "Enable Wiki in repository Settings > Features > Wikis."
            exit 1
          }

          rsync -av --delete docs/wiki/ wiki_repo/

          cd wiki_repo
          if [ -z "$(git status --porcelain)" ]; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs(wiki): sync from docs/wiki"
          git push