name: Bug report
description: Report a language/compiler/runtime bug with minimal reproduction.
title: "bug: <short summary>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for opening this report.
        Please keep each section short and concrete.

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Pick the highest impact level.
      options:
        - P0 - release blocker / data loss / crash in core flow
        - P1 - major broken flow
        - P2 - medium functional issue
        - P3 - low impact / edge case
    validations:
      required: true

  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options:
        - frontend (lexer/parser/ast)
        - semantic (binder/type/diagnostics)
        - hir/zir lowering
        - backend c
        - runtime c
        - stdlib
        - tooling/formatter/driver
        - docs/spec
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Exact command used
      placeholder: python run_all_tests.py
    validations:
      required: true

  - type: textarea
    id: minimal_repro
    attributes:
      label: Minimal reproducible case
      description: Paste the smallest code/input that reproduces the bug.
      placeholder: |
        namespace app.main

        func main() -> int
            return 0
        end
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: Expected result
      placeholder: check should pass with no diagnostics
    validations:
      required: true

  - type: textarea
    id: actual_result
    attributes:
      label: Actual result
      description: Include exact error/output text when possible.
      placeholder: |
        check failed
        error[ZT_DIAG_xxx]: ...
    validations:
      required: true

  - type: textarea
    id: regression_plan
    attributes:
      label: Regression test plan (required)
      description: Which test file will be added or updated?
      placeholder: tests/semantic/test_types.c (new case: ...)
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, compiler/toolchain, and commit hash.
      placeholder: Windows 11, gcc 14.x, commit <sha>
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Final checks
      options:
        - label: I confirmed this issue has a minimal repro.
          required: true
        - label: I confirmed severity and layer are set.
          required: true
        - label: I added a regression test plan.
          required: true
